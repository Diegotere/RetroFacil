<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - RetroFácil</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem;">
  
  <main style="width: 100%; max-width: 1200px; margin: 0 auto;">
    <!-- Logo Centralizada -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <img src="logo.png" alt="RetroFácil Logo" class="login-logo">
    </div>

    <!-- Seção de Login (Estilo Cartão) -->
    <div id="adminLoginSection" class="panel" style="max-width: 400px; margin: 0 auto;">
      <h2 style="text-align: center; margin-bottom: 1.5rem;">Painel Admin</h2>
      <form id="adminLoginForm">
        <label class="field">
          <span>E-mail Administrador</span>
          <input type="email" id="adminEmail" required>
        </label>
        <div class="field">
          <span>Senha</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="password" id="adminPassword" required style="flex: 1;">
            <button type="button" class="password-toggle-text" onclick="togglePassword('adminPassword', this)">Mostrar</button>
          </div>
        </div>
        <button type="submit" class="primary" style="width: 100%; margin-top: 1rem;">Acessar Painel</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem;">
        <a href="login.html" class="ghost small">Voltar para Login</a>
      </p>
    </div>

    <!-- Painel de Gerenciamento (Aparece após login) -->
    <div id="adminPanelSection" style="display: none;">
      <div class="panel" style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0;">Gerenciamento de Usuários</h3>
        <div style="display: flex; gap: 0.5rem;">
          <a href="login.html" class="ghost small">Página Login</a>
          <button class="ghost danger small" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="panel" style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
          <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--border);">
              <th style="padding: 1rem;">Nome</th>
              <th style="padding: 1rem;">E-mail</th>
              <th style="padding: 1rem;">Papel</th>
              <th style="padding: 1rem;">Nova Senha</th>
              <th style="padding: 1rem;">Ações</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="theme.js"></script>
  <script src="admin.js"></script>
</body>
</html>
