<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroFacil - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <article class="panel" style="width: 100%; max-width: 400px;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <img src="logo.png" alt="RetroFácil Logo" class="login-logo" />
      </div>

      <!-- Contexto: exibido quando acessa via link de retro compartilhada -->
      <div id="retroContext" style="display:none; background: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; text-align: center; font-size: 0.9rem;">
        👋 Faça login para participar da retrospectiva compartilhada.
      </div>

      <div id="loginSection">
        <h3>Entrar</h3>
        <form id="loginForm">
          <label class="field">
            <span>E-mail</span>
            <input type="email" id="loginEmail" required />
          </label>
          <label class="field">
            <span>Senha</span>
            <input type="password" id="loginPassword" required />
          </label>
          <button type="submit" class="primary" style="width: 100%; margin-top: 0.5rem;">Entrar</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; color: var(--muted);">
          <button type="button" class="ghost small" id="showRegister">Cadastre-se</button>
        </p>
      </div>

      <div id="registerSection" style="display: none;">
        <h3>Cadastrar</h3>
        <form id="registerForm">
          <label class="field">
            <span>Nome</span>
            <input type="text" id="registerName" required />
          </label>
          <label class="field">
            <span>E-mail</span>
            <input type="email" id="registerEmail" required />
          </label>
          <label class="field">
            <span>Senha</span>
            <input type="password" id="registerPassword" required />
          </label>
          <button type="submit" class="primary" style="width: 100%; margin-top: 0.5rem;">Criar conta</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; color: var(--muted);">
          Já tem conta? <button type="button" class="ghost small" id="showLogin">Faça login</button>
        </p>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0;" />

      <div style="display: flex; justify-content: center;">
        <div id="g_id_onload" data-client_id="737345557047-cd71egdu71tpd8sa66rtb09jj71d51lp.apps.googleusercontent.com"
          data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
          data-text="signin_with" data-size="large" data-logo_alignment="center">
        </div>
      </div>

    </article>
  </main>

  <script src="theme.js"></script>
  <script src="login.js"></script>
</body>

</html>
