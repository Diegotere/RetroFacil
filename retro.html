<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroFacil - Sala da Retro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="retro-layout">
      <!-- Sidebar -->
      <aside class="retro-sidebar">
        <div class="brand" style="margin-bottom: 1.5rem;">
          <img src="logo.png" alt="RetroFácil Logo" class="brand-logo" />
        </div>
        
        <p class="session-type">Retrospectiva - Sessão Ativa</p>

        <div class="sidebar-section">
          <h3>Facilitação</h3>
          <nav class="phase-nav">
            <button class="phase-item active" data-phase="brainstorming">
              <i data-lucide="brain-circuit"></i> Fase: Brainstorming
            </button>
            <button class="phase-item" data-phase="voting">
              <i data-lucide="check-square"></i> Fase: Votação
            </button>
            <button class="phase-item" data-phase="discussion">
              <i data-lucide="message-square"></i> Fase: Discussão
            </button>
          </nav>
        </div>

        <div class="sidebar-section">
          <h3>Participantes</h3>
          <div id="participantsList" class="participants-list">
            <!-- Participants will be listed here -->
          </div>
        </div>

        <div class="sidebar-section">
          <h3>Atividade</h3>
          <div id="activityLog" class="activity-log" style="font-size: 0.8rem; color: var(--muted);">
            <!-- Activity log items -->
          </div>
        </div>

        <div class="sidebar-footer">
          <a href="#" class="footer-item" id="btnInviteTeam">
            <i data-lucide="user-plus"></i> Convidar Equipe
          </a>
          <a href="#" class="footer-item">
            <i data-lucide="help-circle"></i> Ajuda
          </a>
          <a href="index.html" class="footer-item">
            <i data-lucide="archive"></i> Arquivo
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="retro-main">
        <header class="retro-header">
          <div class="header-info">
            <h1>
              <span id="teamName">Team</span>
              <span class="text-muted">/</span>
              <span id="retroTitle" class="session-name">Retro Session</span>
            </h1>
          </div>

          <div class="header-actions">
            <div class="avatar-stack" id="avatarStack">
              <!-- Avatars generated via JS -->
            </div>

            <div class="timer-box" id="timerBox">
              <i data-lucide="timer"></i>
              <input type="text" id="timerDisplay" value="10:00" class="timer-display-input" />
              <div class="timer-controls admin-only">
                <button class="ghost small" id="btnTimerPlay" title="Iniciar"><i data-lucide="play" style="width: 14px;"></i></button>
                <button class="ghost small hidden" id="btnTimerPause" title="Pausar"><i data-lucide="pause" style="width: 14px;"></i></button>
                <button class="ghost small" id="btnTimerStop" title="Parar/Resetar"><i data-lucide="square" style="width: 14px;"></i></button>
              </div>
            </div>

            <button class="ghost small" id="btnInfo"><i data-lucide="info"></i></button>
            <button class="ghost" id="btnExport">Exportar</button>
            <button class="primary" id="btnEndSession">Encerrar Sessão</button>
          </div>
        </header>

        <div class="board-container" id="columnsContainer">
          <!-- Columns will be injected here -->
        </div>
      </main>
    </div>

    <!-- Templates -->
    <template id="columnTemplate">
      <section class="retro-column">
        <header class="column-header">
          <div class="status-dot"></div>
          <h2 class="column-title">Nome da Coluna</h2>
          <span class="count">0</span>
          <button class="ghost small btn-add-card-header"><i data-lucide="plus"></i></button>
        </header>
        
        <button class="add-card-btn">
          <i data-lucide="plus"></i> Adicionar Cartão
        </button>

        <div class="cards-list"></div>
      </section>
    </template>

    <template id="cardTemplate">
      <div class="card-item">
        <p class="card-text">O conteúdo do cartão aparecerá aqui...</p>
        <div class="card-footer">
          <button class="vote-btn ghost small" style="gap: 4px; display: flex; align-items: center;">
            <i data-lucide="thumbs-up" style="width: 14px;"></i>
            <span class="vote-count">0</span>
          </button>
          <div class="card-actions">
            <button class="action-btn ghost small btn-hide-card"><i data-lucide="eye-off"></i></button>
            <img src="" class="author-avatar" style="width: 24px; height: 24px; border-radius: 50%;" />
          </div>
        </div>
      </div>
    </template>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
    <script src="retro.js"></script>
    <script>
      // Initialize icons after load
      window.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) lucide.createIcons();
      });
    </script>
  </body>
</html>
