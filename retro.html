<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroFacil - Sala da Retro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero compact">
      <nav class="nav">
        <div class="brand">
          <img src="logo.png" alt="RetroFácil Logo" class="brand-logo" />
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button class="ghost small" id="themeToggle">🌙 Modo Escuro</button>
          <!-- Só admins veem o link para o painel e o botão de sair -->
          <a href="index.html" class="ghost link-btn small admin-only">← Painel</a>
          <button class="ghost danger small admin-only" id="logoutBtn">Sair</button>
          <!-- Viewers veem o botão de login para se identificar -->
          <button class="ghost small viewer-only" id="viewerLoginBtn" style="display:none;">👤 Fazer login</button>
        </div>
      </nav>
      <section class="hero-content compact">
        <h1 id="retroTitleHeading">Retrospectiva</h1>
        <p id="teamContext"></p>
        <!-- Mensagem de boas-vindas para colaboradores -->
        <p id="viewerWelcome" class="viewer-only hint" style="display:none;"></p>
      </section>
    </header>

    <main>
      <!-- SEÇÃO ADMIN: Compartilhar sala -->
      <section class="panel share-panel admin-only">
        <h2>Compartilhar sala</h2>
        <p class="hint">
          Envie este endereço para colaboradores acessarem esta retrospectiva e adicionarem cartões anonimamente.
        </p>
        <div class="share-row">
          <input id="shareUrl" type="text" readonly />
          <button class="primary" id="copyLink">Copiar link</button>
          <button class="ghost" id="saveRetro">Salvar agora</button>
        </div>
      </section>

      <!-- SEÇÃO ADMIN: Configurar colunas -->
      <section class="panel share-panel admin-only" id="columnConfigSection">
        <h2>Configurar colunas</h2>
        <p class="hint">Você pode criar, editar e remover colunas deste quadro.</p>
        <div class="share-row">
          <input id="newColumnName" type="text" maxlength="30" placeholder="Nome da nova coluna" />
          <button class="primary" id="addColumn">Adicionar coluna</button>
        </div>
      </section>

      <section class="board" id="retroBoard">
        <header class="board-header">
          <h2 id="boardTitle">Retrospectiva</h2>
          <div class="board-controls">
            <!-- BOTÃO ADMIN: Limpar quadro -->
            <button class="ghost admin-only" id="clearBoard">Limpar quadro</button>
          </div>
        </header>

        <div class="columns" id="columns"></div>

        <footer class="board-footer">
          <!-- BOTÃO ADMIN: Modo votação e Encerrar -->
          <button class="primary admin-only" id="startVoting">Modo votação</button>
          <button class="ghost admin-only" id="finishRetro">Encerrar retrospectiva</button>
        </footer>
      </section>
    </main>

    <template id="columnTemplate">
      <article class="column" data-column-id="">
        <header>
          <input class="column-title-input" maxlength="30" />
          <div class="column-actions">
            <button class="ghost small add-card">+ cartão</button>
            <!-- BOTÃO ADMIN: remover coluna -->
            <button class="ghost small remove-column admin-only">🗑</button>
          </div>
        </header>
        <ul class="card-list"></ul>
      </article>
    </template>

    <template id="cardTemplate">
      <li class="card-item">
        <div class="card-top">
          <span class="card-number"></span>
          <button class="ghost small remove-card" title="remover cartão">×</button>
        </div>
        <p class="card-text"></p>
        <div class="card-footer">
          <span class="meta">anônimo</span>
          <button class="vote-btn" title="votar">👍 <span>0</span></button>
        </div>
      </li>
    </template>

    <script src="theme.js"></script>
    <script src="retro.js"></script>
  </body>
</html>
